<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="Content-Security-Policy" content="default-src 'self'; script-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://cdn.socket.io; style-src 'self' 'unsafe-inline' https://cdn.jsdelivr.net https://fonts.googleapis.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: http://localhost:3000; connect-src 'self' http://localhost:3000 ws://localhost:3000 https://cdn.jsdelivr.net https://cdn.socket.io https://api.ipify.org https://fonts.googleapis.com;">
    <title>Ministère de l'Agriculture - Espace Employés</title>
    <link rel="stylesheet" href="styles.css">
    <link rel="stylesheet" href="style/mutuelle.css">
    <link rel="stylesheet" href="style/employees.css">
    <!-- External Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/lucide@0.447.0/dist/umd/lucide.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/fuse.js@7.0.0"></script>
</head>
<body>
    <!-- Login Container (loaded from pages/login.html) -->
    <div id="loginPage"></div>

    <!-- Main App Container -->
    <div class="app-container" style="display: none;">
        <!-- Sidebar (loaded from pages/sidebar.html) -->
        <div id="sidebarContainer" style="height: 100vh;"></div>

        <!-- Main Content Area -->
        <div class="main-content">
            <!-- Top Bar (loaded from pages/topbar.html) -->
            <div id="topbarContainer"></div>

            <!-- Dynamic Content Area -->
            <div class="content-area" id="contentArea">
                <!-- Pages will be loaded here dynamically -->
            </div>
        </div>
    </div>

    <!-- Custom Modal -->
    <div class="custom-modal" id="customModal">
        <div class="modal-content">
            <div class="modal-icon" id="modalIcon"></div>
            <h3 id="modalTitle"></h3>
            <p id="modalMessage"></p>
            <div class="modal-buttons" id="modalButtons"></div>
        </div>
    </div>

    <!-- Scripts -->
    <script src="https://cdn.socket.io/4.7.2/socket.io.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/jspdf-autotable@3.5.25/dist/jspdf.plugin.autotable.min.js"></script>
    
    <!-- Sound Effects -->
    <script src="src/shared/sounds.js"></script>
    
    <!-- Modular Architecture — single entry point -->
    <script type="module">
        import('./src/main.js').then(module => {
            console.log('✅ Module loaded');
        }).catch(err => {
            console.error('❌ Module loading failed:', err);
            document.body.innerHTML = '<div style="padding:2rem;"><h3>Erreur de chargement</h3><pre>'+err.message+'</pre></div>';
        });
    </script>
</body>
</html>
