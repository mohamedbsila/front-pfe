<div class="labor-details-container">
    <div class="charts-row" style="display: grid; grid-template-columns: 1fr 1fr; gap: 20px; margin-bottom: 25px;">
        <!-- Fodder Consumption Trend -->
        <div class="chart-card">
            <div class="chart-header">
                <span class="chart-title">Consommation d'Aliments</span>
                <span style="font-size: 0.8rem; color: #6c757d; font-weight: 600;">UNITÉS / ANNÉE</span>
            </div>
            <div style="height: 250px; position: relative;">
                <canvas id="fodderTrendChart"></canvas>
            </div>
        </div>

        <!-- Feed Type Distribution -->
        <div class="chart-card">
            <div class="chart-header">
                <span class="chart-title">Répartition par Type</span>
                <span style="font-size: 0.8rem; color: #6c757d; font-weight: 600;">% QUANTITÉ</span>
            </div>
            <div style="height: 250px; position: relative;">
                <canvas id="feedTypeChart"></canvas>
            </div>
        </div>
    </div>

    <!-- Summary Highlights -->
    <div class="labor-summary-grid">
        <div class="summary-stat-card">
            <span class="stat-label">Stock Total</span>
            <span id="stat-fodder-stock" class="stat-value">12 450 kg</span>
        </div>
        <div class="summary-stat-card">
            <span class="stat-label">Coût Global</span>
            <span id="stat-fodder-cost" class="stat-value" style="color: #000;">85,320 DT</span>
        </div>
        <div class="summary-stat-card">
            <span class="stat-label">Taux de Couverture</span>
            <span id="stat-fodder-coverage" class="stat-value">95%</span>
        </div>
    </div>

    <!-- Main Fodder Table -->
    <div class="formal-table-card">
        <table class="formal-table">
            <thead>
                <tr>
                    <th rowspan="2" style="text-align: center; border-right: 2px solid #000;">الفئة</th>
                    <th colspan="12" style="text-align: center; background: #fafafa; border-bottom: 2px solid #000;">ALIMENT CONCENTRÉ</th>
                    <th colspan="4" style="text-align: center; background: #fafafa; border-left: 2px solid #000; border-bottom: 2px solid #000;">FOURRAGE GROSSIER</th>
                </tr>
                <tr>
                    <!-- Concentrates -->
                    <th style="font-size: 0.75rem;">ALYEF</th>
                    <th style="font-size: 0.75rem;">CMV</th>
                    <th style="font-size: 0.75rem;">PULPE BETT</th>
                    <th style="font-size: 0.75rem;">AVOINE</th>
                    <th style="font-size: 0.75rem;">MAIS</th>
                    <th style="font-size: 0.75rem;">SOJA</th>
                    <th style="font-size: 0.75rem;">N°6B</th>
                    <th style="font-size: 0.75rem;">N°6A</th>
                    <th style="font-size: 0.75rem;">N11</th>
                    <th style="font-size: 0.75rem;">N°9</th>
                    <th style="font-size: 0.75rem;">N°7</th>
                    <th style="font-size: 0.75rem;">N°5</th>
                    <!-- Roughage -->
                    <th style="font-size: 0.75rem; border-left: 2px solid #000;">PAILLE</th>
                    <th style="font-size: 0.75rem;">FOIN</th>
                    <th style="font-size: 0.75rem;">VERDURE</th>
                    <th style="font-size: 0.75rem;">ENSILAGE</th>
                </tr>
            </thead>
            <tbody id="fodderTableBody">
                <!-- Data will be injected here -->
            </tbody>
        </table>
    </div>
</div>
